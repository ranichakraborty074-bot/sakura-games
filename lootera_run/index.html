<!DOCTYPE html>
<html>
<head>
    <title>Lootera Run</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #ff007f; text-align: center; font-family: sans-serif; padding: 50px; }
        .score { font-size: 30px; margin: 20px; color: #fff; }
        .btn { padding: 20px 40px; font-size: 20px; background: #ff007f; color: #fff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px #ff007f; }
        .btn:active { transform: scale(0.9); }
    </script>
</head>
<body>
    <h1>💰 LOOTERA RUN 💰</h1>
    <p>Jaldi tap kar aur loot! 💅🔥</p>
    <div class="score">Maal: ₹<span id="val">0</span></div>
    <button class="btn" onclick="loot()">LOOT! 🤑</button>
    <script>
        let s = 0;
        function loot() {
            s += Math.floor(Math.random() * 100) + 10;
            document.getElementById('val').innerText = s;
        }
    </script>
</body>
          </html>
