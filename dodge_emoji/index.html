<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { background: #000; color: yellow; text-align: center; overflow: hidden; }
    #box { width: 100px; height: 100px; background: red; margin: auto; border-radius: 10px; transition: 0.1s; }
</style></head>
<body>
    <h1>🙄 DODGE EMOJI 🙄</h1>
    <p>Box ko touch mat hone dena! 💀</p>
    <div id="box" onmouseover="move()">🏃‍♂️</div>
    <script>
        function move(){
            let b = document.getElementById('box');
            b.style.marginTop = Math.random()*300 + "px";
            b.style.marginLeft = Math.random()*200 + "px";
        }
    </script>
</body>
</html>
